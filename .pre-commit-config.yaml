# Commit gate. Install with `make hooks`. CI's audit job also runs
# `pre-commit run --all-files`, so an uninstalled hook cannot hide a violation.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (no auto-fix)
        entry: uv run ruff check --no-fix
        language: system
        types_or: [python]
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check
        language: system
        types_or: [python]
      - id: eslint
        name: eslint (staged frontend files)
        entry: scripts/eslint_staged.sh
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
