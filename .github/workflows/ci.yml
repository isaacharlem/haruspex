# Every job executes Make targets, so local `make ci` green => CI green.
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HARUSPEX_DATABASE_URL: postgresql+asyncpg://haruspex:haruspex@localhost:5432/haruspex

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: haruspex
          POSTGRES_PASSWORD: haruspex
          POSTGRES_DB: haruspex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haruspex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: make lint-python
      - run: make typecheck-backend
      - run: make test-backend

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: make typecheck-sdk
      - run: make test-sdk

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: make lint-frontend
      - run: make typecheck-frontend
      - run: make test-frontend
      - run: make build-frontend

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install ripgrep and gitleaks
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - run: uv sync --all-packages
      - run: pnpm -C frontend install --frozen-lockfile
      - run: make audit

  vuln-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm -C frontend install --frozen-lockfile
      - run: make vuln-audit

  contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: haruspex
          POSTGRES_PASSWORD: haruspex
          POSTGRES_DB: haruspex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haruspex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: make contract

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and start the stack
        run: |
          docker compose -f deploy/docker-compose.yml build
          docker compose -f deploy/docker-compose.yml up -d db api worker
      - run: make smoke
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs --tail 100
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm -C frontend install --frozen-lockfile
      - run: pnpm -C frontend exec playwright install chromium --with-deps
      - name: Start the full demo
        run: make demo
      - run: make e2e
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml --profile demo logs --tail 150
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml --profile demo down -v
